name: Feature Request
description: Suggest an idea
title: "[Feature]: "
body:
  - type: textarea
    id: overview
    attributes:
      label: Overview
      description: 어떤 작업을 하고 싶은지 간단히 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: suggested_solution
    attributes:
      label: Suggested solution
      description: |
        어떻게 동작하면 좋을지, 구조나 동작 방식에 대한 아이디어가 있다면 적어주세요.
    validations:
      required: false

  - type: textarea
    id: etc
    attributes:
      label: Etc
      description: |
        스크린샷, 콘솔 로그, 환경 정보(OS, 브라우저 등), 관련 커밋, 관련 PR 등을 자유롭게 기재해주세요.
    validations:
      required: false
