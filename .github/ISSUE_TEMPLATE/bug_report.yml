name: Bug Report
description: Create a report to help us improve
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: overview
    attributes:
      label: Overview
      description: 버그에 대해 명확하고 간결한 설명을 적어주세요.
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: 기대했던 동작을 구체적으로 작성해주세요.
    validations:
      required: false

  - type: textarea
    id: to_reproduce
    attributes:
      label: To Reproduce
      description: 버그가 발생한 과정을 단계별로 작성해주세요.
      placeholder: |
        최소한으로 재현 가능한 코드 또는 재현 단계를 설명해주세요. 선택 사항이지만 권장됩니다.
      value: |
        1.
    validations:
      required: false

  - type: textarea
    id: possible_solution
    attributes:
      label: Possible solution
      description: 해결 방안이나 의심되는 원인이 있다면 간단히 설명해주세요.
      placeholder: 제 생각엔 아마도...
    validations:
      required: false

  - type: textarea
    id: etc
    attributes:
      label: Etc
      description: |
        스크린샷, 콘솔 로그, 환경 정보(OS, 브라우저 등), 관련 커밋, 관련 PR 등을 자유롭게 기재해주세요.
    validations:
      required: false
